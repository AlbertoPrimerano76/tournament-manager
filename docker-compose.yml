name: rugby-app-local

services:
  postgres:
    image: postgres:16-alpine
    container_name: rugby-app-local-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: rugby
      POSTGRES_PASSWORD: rugby
      POSTGRES_DB: rugby_tournament
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rugby -d rugby_tournament"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ./backend
    container_name: rugby-app-local-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://rugby:rugby@postgres:5432/rugby_tournament
      TEST_DATABASE_URL: sqlite+aiosqlite:///./test.db
      JWT_SECRET: change-me-in-docker
      JWT_ACCESS_EXPIRE_MINUTES: 30
      JWT_REFRESH_EXPIRE_DAYS: 7
      ALLOWED_ORIGINS: http://localhost:5180
      ENVIRONMENT: development
      SUPABASE_URL: ""
      SUPABASE_KEY: ""
      SUPABASE_BUCKET: rugby-images
      DEFAULT_ADMIN_EMAIL: admin@rugby.it
      DEFAULT_ADMIN_PASSWORD: Admin123!
    working_dir: /app
    command: >
      sh -c "uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    ports:
      - "8002:8000"
    volumes:
      - ./backend:/app
      - backend_uploads:/app/uploads
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 20

  frontend:
    build:
      context: ./frontend
    container_name: rugby-app-local-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      VITE_API_PROXY_TARGET: http://backend:8000
    working_dir: /app
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "5180:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules

volumes:
  postgres_data:
  backend_uploads:
  frontend_node_modules:
