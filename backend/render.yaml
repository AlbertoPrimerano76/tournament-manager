services:
  - type: web
    name: rugby-tournament-api
    env: python
    buildCommand: pip install -r requirements.txt && PYTHONPATH=. python scripts/init_production_db.py && alembic upgrade head
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: ALLOWED_ORIGINS
        sync: false
      - key: ENVIRONMENT
        value: production
      - key: DEFAULT_ADMIN_EMAIL
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: RESET_TOKEN_EXPIRE_MINUTES
        value: "60"
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USERNAME
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM_EMAIL
        sync: false
      - key: SMTP_FROM_NAME
        value: Rugby Event Manager
      - key: SMTP_USE_TLS
        value: "true"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: SUPABASE_BUCKET
        value: rugby-images
    healthCheckPath: /health
