services:
  postgres:
    image: postgres:16-alpine
    container_name: rugby-app-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: rugby
      POSTGRES_PASSWORD: rugby
      POSTGRES_DB: rugby_tournament
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
